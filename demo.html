<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crossword demo</title>
  <link rel="stylesheet" href="crossword.css">
</head>
<body>
  <main style="max-width: 1100px; margin: 40px auto; padding: 0 16px;">
    <div class="crossword" data-crossword-id="demo-001">
      <script type="application/json">
        {
          "id": "demo-001",
          "title": "A Tiny Crossword",
          "author": "Your Name",
          "description": "A small demonstration puzzle.",
          "solution": ["CAT", "ARE", "TEN"],
          "clues": {
            "across": { "1": "Feline pet", "4": "Exist, for more than one", "5": "Number after nine" },
            "down": { "1": "Motor vehicle, informally", "2": "Exist, for one", "3": "Highest card, sometimes" }
          }
        }
      </script>
    </div>
  </main>
  <script src="crossword.js"></script>
</body>
</html>
